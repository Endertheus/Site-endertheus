<!DOCTYPE html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"> <!-- Importamos do font awesome para usar os ícones do github e do instagram -->
    <link rel="stylesheet" href="../CSS/menu.css">
    <link rel="stylesheet" href="../CSS/contato.css">
</head>

<body>

    <header>
        <nav>
            <ul>
                <li><a href="../index.html">Home</a></li>
                <li><a href="sobre.html">Sobre</a></li>
                <li><a href="projetos.html">Projetos</a></li>
                <li><a href="novidades.html">Novidades</a></li>
                <li><a href="contato.html" class="active">Contato</a></li>
            </ul>
        </nav>
    </header>

    <main class="contato-container">
        <section class="coluna-esquerda">
            <h1>Mande uma mensagem</h1> <!-- Título da metade do formulário -->
            <form action="#"> <!-- Sem ação para o formulário, podendo ser atualiado mais tarde-->
                <div class="campo">
                    <label for="nome">Nome:</label>
                    <input type="text" id="nome" name="nome" placeholder="Nome completo" required>
                </div>
                <div class="campo">
                    <label for="email">E-mail:</label>
                    <input type="email" id="email" name="email" placeholder="seu@email.com" required>
                </div>
                <div class="campo">
                    <label for="mensagem">Mensagem:</label>
                    <textarea id="mensagem" name="mensagem" rows="5" placeholder="..." required></textarea>
                </div>
                <button type="submit">Enviar Mensagem</button> 
            </form>
        </section>

        <div class="divisor"></div> <!-- Para a linha que separa as redes sociais do formulário -->

        <section class="coluna-direita">
            <h1>Minhas redes</h1>
            <ul class="redes-sociais">
                <li>
                    <i class="fab fa-github icone-rede"></i> <!-- Importa o símbolo do github -->
                    <div class="info-rede">
                        <a href="https://github.com/endertheus" target="_blank"> <strong>GitHub</strong> </a> <!-- utilizando a tag strong para deixar o texto mais destacado -->
                    </div>
                </li>
                <li>
                    <i class="fab fa-instagram icone-rede"></i> <!-- Importa o símbolo do instagram -->
                    <div class="info-rede">
                        <a href="https://instagram.com/endertheus_" target="_blank"> <strong>Instagram</strong> </a>
                    </div>
                </li>
            </ul>
        </section>
    </main>

</body>
</html>
